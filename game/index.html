<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Münzen Spiel</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

canvas {
  background: linear-gradient(#222, #000);
  display: block;
  margin: auto;
  touch-action: none;
}
</style>
</head>

<body>

<h2>🪙 Münzen fangen</h2>
<p>Punkte: <span id="score">0</span></p>

<canvas id="game" width="350" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
 x: 150,
 y: 550,
 w: 50,
 h: 30
};

let coin = {
 x: Math.random()*320,
 y: 0,
 size: 20
};

let score = 0;

let left = false;
let right = false;


// Touch Steuerung
canvas.addEventListener("touchmove", e=>{
 let touch = e.touches[0];
 let rect = canvas.getBoundingClientRect();

 player.x = touch.clientX - rect.left - player.w/2;

 if(player.x < 0) player.x = 0;
 if(player.x > canvas.width-player.w)
 player.x = canvas.width-player.w;
});

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);


// Spieler
ctx.fillStyle="cyan";
ctx.fillRect(player.x,player.y,player.w,player.h);


// Münze
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(coin.x,coin.y,coin.size,0,Math.PI*2);
ctx.fill();


// Bewegung Münze
coin.y += 5;


// Treffer
if(
 coin.y+coin.size > player.y &&
 coin.x > player.x &&
 coin.x < player.x+player.w
){
 score++;
 document.getElementById("score").innerHTML=score;

 coin.y=0;
 coin.x=Math.random()*320;
}


// Verloren
if(coin.y>600){
 coin.y=0;
 coin.x=Math.random()*320;
}


// weiter
requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
